# ============================================
# Forge Admin 一键部署 Docker Compose 编排
# ============================================
# MySQL：不在此编排中部署，请在 .env 中配置 MYSQL_HOST 等指向已有数据库（本机可为 host.docker.internal）。
# 使用方式：
#   cd docker
#   cp .env.example .env   # 修改配置（含外部 MySQL 地址与账号）
#   docker compose up -d
#   访问 http://localhost/forge  默认账号: admin/123456
# ============================================

services:
  # ========================
  # Redis 缓存
  # ========================
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-forge123456} --appendonly yes
    ports:
      # 宿主机默认 6381 → 容器 6379（应用走服务名 redis:6379，不受此处影响）
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-forge123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forge-network

  # ========================
  # Forge Flow 流程服务（需先于 admin 启动）
  # ========================
  forge-flow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flow
    container_name: forge-flow
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-10.20.124.71}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DB: ${MYSQL_DB:-swhi_ims_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-swroot!#30}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-forge123456}
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "${FLOW_PORT:-8081}:8081"
    networks:
      - forge-network

  # ========================
  # Forge Admin 主服务
  # ========================
  forge-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    container_name: forge-admin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      forge-flow:
        condition: service_started
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-10.20.124.71}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DB: ${MYSQL_DB:-swhi_ims_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-swroot!#30}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-forge123456}
      FLOW_CLIENT_URL: http://forge-flow:8081
      JAVA_OPTS: -Xms256m -Xmx512m
    ports:
      - "${ADMIN_PORT:-8580}:8580"
    networks:
      - forge-network

  # ========================
  # 前端 Nginx
  # ========================
  forge-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    container_name: forge-ui
    restart: unless-stopped
    depends_on:
      - forge-admin
      - forge-flow
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - forge-network

# ========================
# 数据卷
# ========================
volumes:
  redis_data:
    driver: local

# ========================
# 网络
# ========================
# 显式指定子网：避免 Docker 默认地址池耗尽时出现
# 「could not find an available, non-overlapping IPv4 address pool」；
# 若与宿主机 VPN/其它 compose 冲突，请改subnet或先 docker network prune
networks:
  forge-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.250.0.0/16
