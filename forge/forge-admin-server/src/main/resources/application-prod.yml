server:
  # 服务器的HTTP端口，默认为8080
  # port: 8580
  port: 80
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    dynamic:
      # 设置默认的数据源或者数据源组,默认值即为 master
      primary: master
      # 严格模式 匹配不到数据源则报错
      strict: true
      datasource:
        # 主库数据源
        master:
          type: ${spring.datasource.type}
          driverClassName: com.mysql.cj.jdbc.Driver
          # jdbc 所有参数配置参考 https://lionli.blog.csdn.net/article/details/122018562
          # rewriteBatchedStatements=true 批处理优化 大幅提升批量插入更新删除性能(对数据库有性能损耗 使用批量操作应考虑性能问题)
          url: jdbc:mysql://10.20.124.73:3306/swhi_ims_db?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
          username: root
          password: 'swroot!#30'
      hikari:
        # 最大连接池数量
        maxPoolSize: 20
        # 最小空闲线程数量
        minIdle: 10
        # 配置获取连接等待超时的时间
        connectionTimeout: 30000
        # 校验超时时间
        validationTimeout: 5000
        # 空闲连接存活最大时间，默认10分钟
        idleTimeout: 600000
        # 此属性控制池中连接的最长生命周期，值0表示无限生命周期，默认30分钟
        maxLifetime: 1800000
        # 多久检查一次连接的活性
        keepaliveTime: 30000

spring.data:
  redis:
    # 地址
    host: redis.base-pro.svc.cluster.local
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # redis 密码必须配置
#    password: 'your_redis_password'
    # 连接超时时间
    timeout: 10s
    # 是否开启ssl
    ssl.enabled: false
    # Redisson配置
    redisson:
      config: |
        singleServerConfig:
          address: "redis://redis.base-pro.svc.cluster.local:6379"
          database: 0
          password: forge123456
          connectTimeout: 10000
          timeout: 3000
          retryAttempts: 3
          retryInterval: 1500
          connectionPoolSize: 64
          connectionMinimumIdleSize: 10
        threads: 16
        nettyThreads: 32
config:
  datasource:
    url: ${spring.datasource.dynamic.datasource.master.url}
    username: ${spring.datasource.dynamic.datasource.master.username}
    password: ${spring.datasource.dynamic.datasource.master.password}
    driverClassName: ${spring.datasource.dynamic.datasource.master.driverClassName}
forge:
  flow:
    client:
      url: http://127.0.0.1:8081
  crypto:
    enabled: false

  # 泛微 SSO（三方登录）
  sso:
    weaver:
      enabled: true
      base-url: "http://10.20.123.5"
      # 完整登录入口（配置后后端将直接跳转，不再拼接 appid/service/_key）
      login-url: "http://10.20.123.5/wui/index.html#/?appid=oneApp&service=http://10.20.124.10/web/ims/"
      client-id: "xa"
      client-secret: "xa"
      # redirect_uri 作为 query 参数传递时不能包含未编码的 '#'
      # 统一回跳到前端根地址，由前端登录页解析 ticket 并完成登录
      redirect-uri: "http://10.20.124.10/web/ims/"
      service-url: "http://10.20.124.10/web/ims/"
      wui-key: "704693"
      state-ttl-seconds: 300

# 外部系统同步（泛微）
external:
  weaver:
    enabled: true
    # 响应体形态：tree_children（{children:[]}）| flat_data（{data:[]}，如 getUsersInfo）
    sync-payload-type: flat_data
    # 全量接口地址（flat 示例：http://内网:8520/api/getUsersInfo）
    sync-url: http://10.20.124.12:8520/api/getUsersInfo
    http-method: POST
    # 整段 Authorization（与下面 token 二选一，优先整段；密钥用环境变量，勿提交仓库）
    authorization-header-name: authorization
    authorization-header-value: $2a$10$B4hlkQR1AvcjOgrEuQAIROMOi4wWJKyr39GG.bpdb53rwQ5EPLvDCswhi@2023
    # 静态 token（Bearer 等场景）
    token: ""
    token-header: Authorization
    token-prefix: "Bearer "
    # workcode 为空时是否用 resource_id 作为外部主键（默认 false）
    workcode-fallback-to-resource-id: false
    # 部门名称含此子串则同步为禁用组织
    org-disabled-name-contains: "已封存"
    # 泛微人员 status 数字 -> 本系统 userStatus（0/1/2）
    user-status-map:
      "1": 1
      "6": 0
    # 同步写入到哪个租户（单租户可固定为1）
    tenant-id: 1
    root-company-name: "四川水发勘测设计研究有限公司"